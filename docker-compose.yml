services:
  app:
    container_name: app_prefeitura_front
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV}
    ports:
      - "83:80"
    environment:
      NODE_ENV: ${NODE_ENV}
    networks:
      - dokploy-network
networks:
  dokploy-network:
    external: true
