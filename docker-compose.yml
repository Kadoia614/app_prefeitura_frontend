services:
  app:
    container_name: app_prefeitura_front
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "83:80"
    environment:
      VITE_ENV: ${NODE_ENV}
    args:
      - VITE_ENV=${NODE_ENV}
    networks:
      - dokploy-network
networks:
  dokploy-network:
    external: true
