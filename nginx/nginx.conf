server {
    # Or other port
    listen 80 default_server;
    # IPV6 is disabled
    
    server_name app_prefeitura;
    location /api {
        proxy_pass http://prefeituraapp-backendgatwei-3iivrm-gatwei-1:3000/api;
        proxy_http_version 1.1;
    }

    location /ft/ {
        proxy_pass http://prefeituraapp-appprefeiturafrentetrabalho-fw7c4f-frente_trabalho-1:3000/ft/;
        proxy_http_version 1.1;
    }

    # server SPA
    root /usr/share/nginx/app_prefeitura;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}