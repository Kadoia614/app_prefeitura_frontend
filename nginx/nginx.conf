server {
    listen 80 default_server;
    server_name _;

    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $sap_backend sap_prefeitura:3000;
    set $ft_backend app_prefeitura_frente_trabalho:3000;

    root /usr/share/nginx/app_prefeitura;
    index index.html;

    location = /api {
        return 308 /api/;
    }

    location ^~ /api/ {
        rewrite ^/api/(.*)$ /api/v2/$1 break;
        proxy_pass http://$sap_backend;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;

        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /ft/ {
        rewrite ^/ft/(.*)$ /ft/$1 break;
        proxy_pass http://$ft_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
